name: Release

on:
  push:
    tags:
      - "*"
      - "!v*"       # macOS app releases (make-dmg --release)
      - "!win-v*"   # Windows app releases (windows-release.yml)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-meeting-notes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # manifest.json version must match the tag.
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json versions.json